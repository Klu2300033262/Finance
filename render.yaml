# 🟨 Render Backend-Only Deployment Configuration

version: "1"
services:
  - type: web
    name: spendwise-backend
    env: production
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && npm run start:prod"
    healthCheckPath: /api/health
    healthCheckTimeout: 30000
    autoDeploy: true
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
    headers:
      - X-Frame-Options: "DENY"
      - X-Content-Type-Options: "nosniff"
      - Referrer-Policy: "strict-origin-when-cross-origin"
    instanceType: free
    region: oregon
